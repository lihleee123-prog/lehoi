<script>
        // Simple micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.02]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.02]');
            });
        });

        // Initialize App and Autocomplete
        window.initApp(() => {
            const inputUnit = document.getElementById('input-unit');
            const inputName = document.getElementById('input-name');
            const autocompleteList = document.getElementById('autocomplete-list');
            let currentNames = [];

            function populateUnits() {
                // Save current selected value
                const currentVal = inputUnit.value;
                
                inputUnit.innerHTML = '<option value="" disabled selected hidden>Chọn cơ quan, tổ chức</option>';
                const units = [...new Set(window.guestsData.map(g => g.unit))].sort();
                units.forEach(unit => {
                    const opt = document.createElement('option');
                    opt.value = unit;
                    opt.textContent = unit;
                    inputUnit.appendChild(opt);
                });
                
                // Restore selected value if still exists
                if (currentVal && units.includes(currentVal)) {
                    inputUnit.value = currentVal;
                }
            }

            // Update current valid names based on unit
            function updateNames() {
                const selectedUnit = inputUnit.value;
                const filtered = window.guestsData.filter(g => !selectedUnit || g.unit === selectedUnit);
                currentNames = filtered.map(g => g.name);
            }

            // Initial population
            populateUnits();
            updateNames();

            inputUnit.addEventListener('change', updateNames);
            
            // Listen for Firebase data updates
            window.addEventListener('guestsDataUpdated', () => {
                populateUnits();
                updateNames();
            });
            
            // Custom Autocomplete Logic
            inputName.addEventListener('input', function() {
                const val = this.value;
                autocompleteList.innerHTML = '';
                if (!val) {
                    autocompleteList.classList.add('hidden');
                    return;
                }
                
                const searchStr = window.removeAccents(val).trim().replace(/\s+/g, ' ');
                // Use a Set to avoid duplicate names in autocomplete
                const uniqueMatches = [...new Set(currentNames.filter(name => 
                    window.removeAccents(name).trim().replace(/\s+/g, ' ').includes(searchStr)
                ))];
                
                if (uniqueMatches.length > 0) {
                    autocompleteList.classList.remove('hidden');
                    uniqueMatches.forEach(name => {
                        const item = document.createElement("DIV");
                        item.className = "px-4 py-3 hover:bg-surface-container cursor-pointer text-body-md border-b border-outline-variant/20 last:border-0";
                        item.textContent = name;
                        item.addEventListener("click", function() {
                            inputName.value = name;
                            autocompleteList.classList.add('hidden');
                        });
                        autocompleteList.appendChild(item);
                    });
                } else {
                    autocompleteList.classList.add('hidden');
                }
            });
            
            // Hide autocomplete when clicking outside
            document.addEventListener('click', function(e) {
                if (e.target !== inputName && e.target !== autocompleteList) {
                    autocompleteList.classList.add('hidden');
                }
            });
        });

        // Search button click effect and logic
        const searchBtn = document.getElementById('search-btn');
        
        document.getElementById('input-name').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                searchBtn.click();
            }
        });

        searchBtn.addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerHTML;
            
            const inputName = document.getElementById('input-name').value.trim();
            const inputUnit = document.getElementById('input-unit').value;
            const errorEl = document.getElementById('search-error');
            
            if (!inputUnit || !inputName) {
                errorEl.textContent = "Vui lòng chọn đơn vị và nhập họ tên!";
                errorEl.classList.remove('hidden');
                return;
            }
            
            btn.innerHTML = '<span class="flex items-center gap-2"><svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> ĐANG TÌM KIẾM...</span>';
            
            setTimeout(() => {
                const nameVal = window.removeAccents(inputName).replace(/\s+/g, ' ');
                const unitVal = inputUnit; 
                
                // Find guest with normalized string comparison
                let match = window.guestsData.find(g => 
                    window.removeAccents(g.name).trim().replace(/\s+/g, ' ') === nameVal && 
                    g.unit === unitVal
                );
                
                if (match) {
                    if (!match.seat) {
                        errorEl.textContent = "Khách mời này chưa được xếp chỗ hoặc đã bị hủy ghế!";
                        errorEl.classList.remove('hidden');
                        btn.innerHTML = originalText;
                        return;
                    }

                    // Check if they are already checked in (either locally or globally)
                    const savedGuestId = localStorage.getItem('myCheckedInGuest');
                    const myGuests = JSON.parse(localStorage.getItem('myCheckedInGuests') || '[]');
                    const isOccupied = window.seatStatusMap[match.seat] === 'occupied' || match.status === 'present';
                    
                    // Allow if the guest is in our myGuests array, OR if it's the savedGuestId
                    const isMyGuest = myGuests.includes(match.id) || String(savedGuestId) === String(match.id);

                    if (isOccupied && !isMyGuest) {
                        errorEl.textContent = "Chỗ ngồi này đã có người ngồi, vui lòng kiểm tra và nhập lại!";
                        errorEl.classList.remove('hidden');
                        btn.innerHTML = originalText;
                        return;
                    }

                    if (!isOccupied) {
                        // Not checked in yet, perform check-in
                        window.checkInUser(match);
                    } else {
                        // isOccupied && isMyGuest
                        // Already checked in on THIS device, just proceed to map.
                        // Set them as the active guest so the map highlights their seat correctly
                        localStorage.setItem('myCheckedInGuest', match.id);
                        window.myCheckedInGuest = match.id;
                    }
                    
                    errorEl.classList.add('hidden');
                    window.location.href = 'index2.html';
                } else {
                    errorEl.textContent = "Không tìm thấy khách mời. Vui lòng kiểm tra lại!";
                    errorEl.classList.remove('hidden');
                    btn.innerHTML = originalText;
                }
            }, 800);
        });
    </script>
